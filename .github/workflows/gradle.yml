name: Java CI with Gradle

on:
  push:
    branches-ignore:
      - "dependabot/**"
    tags-ignore:
      - "**"
    paths:
      - "**.java"
      - "**.json"
      - "**.yml"
      - "gradle**"
      - "*.gradle"
      - "*.accesswidener"
  pull_request:
    paths:
      - "**.java"
      - "**.json"
      - "**.yml"
      - "gradle**"
      - "*.gradle"
      - "*.accesswidener"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/1.') }}

      - name: Build
        run: ./gradlew build --refresh-dependencies --stacktrace --warning-mode=fail

      - name: Upload Forge jars artifact
        uses: actions/upload-artifact@v4
        with:
          name: wurst-forge-jars
          path: build/dist/*.jar
          if-no-files-found: error

      - name: Upload to VirusTotal for analysis
        id: virustotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        if: ${{ env.VIRUSTOTAL_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ env.VIRUSTOTAL_API_KEY }}
          files: |
            ./build/dist/*.jar
        continue-on-error: true

      - name: Add VirusTotal links to build summary
        if: ${{ steps.virustotal.outputs.analysis }}
        run: |
          echo "<details open>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>VirusTotal Scans</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          IFS=',' read -ra ANALYSIS <<< "${{ steps.virustotal.outputs.analysis }}"
          for i in "${ANALYSIS[@]}"; do
            filepath=${i%%=*}
            url=${i#*=}
            filename=$(basename "$filepath")
            echo "- [$filename]($url)" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
